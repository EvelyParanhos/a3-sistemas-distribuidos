services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Fixa o issuer dos tokens em http://localhost:8080 independentemente de como
      # o Keycloak for acessado, evitando divergência no claim 'iss' validado pelas APIs.
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    restart: unless-stopped

  db-init:
    build: ./api-principal
    command: npm run db:init
    environment:
      NODE_ENV: production
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api-principal:
    build: ./api-principal
    environment:
      NODE_ENV: production
      API_PORT: 3000
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
    expose:
      - "3000"
    restart: unless-stopped

  servico-relatorios:
    build: ./servico-relatorios
    environment:
      NODE_ENV: production
      RELATORIOS_PORT: 3001
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DB_USER_READ: ${DB_USER_READ}
      DB_PASS_READ: ${DB_PASS_READ}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    expose:
      - "3001"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-principal
      - servico-relatorios
    restart: unless-stopped
